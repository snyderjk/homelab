apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
  namespace: keycloak
spec:
  instances: 1

  db:
    vendor: postgres
    host: keycloak-db-rw.keycloak.svc.cluster.local
    port: 5432
    database: keycloak
    usernameSecret:
      name: keycloak-db-app
      key: username
    passwordSecret:
      name: keycloak-db-app
      key: password

  http:
    httpEnabled: true
    httpPort: 8080

  hostname:
    hostname: keycloak.snyderhomelab.com
    strict: false

  proxy:
    headers: xforwarded

  ingress:
    enabled: false

  additionalOptions:
  - name: hostname-backchannel-dynamic
    value: "true"

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi
