apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: keycloak
spec:
  interval: 30m
  chart:
    spec:
      chart: keycloak
      version: "25.2.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 12h

  values:
    auth:
      adminUser: admin
      existingSecret: keycloak-admin-credentials
      passwordSecretKey: password

    postgresql:
      enabled: false

    externalDatabase:
      host: keycloak-db-rw.keycloak.svc.cluster.local
      port: 5432
      database: keycloak
      user: keycloak
      existingSecret: keycloak-db-app
      existingSecretPasswodKey: password

    production: true
    proxy: edge
    proxyHeaders: "xforwarded"

    ingress:
      enabled: true
      insgressClassName: traefik
      hostname: keycloak.snyderhomelab.com
      tls: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod

    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        memory: 1Gi
