apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: keycloak
spec:
  interval: 30m
  chart:
    spec:
      chart: keycloak
      version: "25.2.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      interval: 12h

  values:
    image:
      registry: quay.io
      repository: keycloak/keycloak
      tag: "26.3.3"
      pullPolicy: IfNotPresent

    auth:
      adminUser: admin
      existingSecret: keycloak-admin-credentials
      passwordSecretKey: password

    postgresql:
      enabled: false

    extraEnvVars:
    - name: KC_DB
      value: "postgres"
    - name: KC_DB_URL
      value: "jdbc:postgresql://keycloak-db-rw.keycloak.svc.cluster.local:5432/keycloak"
    - name: KC_DB_USERNAME
      value: "keycloak"
    - name: KC_DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: keycloak-db-app
          key: password
    - name: KC_HOSTNAME
      value: "keycloak.snyderhomelab.com"
    - name: KC_PROXY_HEADERS
      value: "xforwarded"
    - name: KC_HTTP_ENABLED
      value: "true"

    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        memory: 1Gi
