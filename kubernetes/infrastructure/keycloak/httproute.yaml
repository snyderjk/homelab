apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: keycloak
spec:
  parentRefs:
  - name: traefik-gateway
    namespace: traefik
  hostnames:
  - keycloak.snyderhomelab.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    filters:
    - type: RequestHeaderModifier
      requestHeaderModifier:
        set:
        - name: X-Forwarded-Proto
          value: https
        - name: X-Forwarded-Host
          value: keycloak.snyderhomelab.com
        - name: X-Forwarded-Port
          value: "443"
    backendRefs:
    - name: keycloak-service # Double-check this name with: kubectl get svc -n keycloak
      port: 8080
