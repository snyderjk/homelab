apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-runners
  namespace: arc-systems
spec:
  interval: 1h
  chart:
    spec:
      chart: gha-runner-scale-set
      version: ">=0.9.0"
      sourceRef:
        kind: HelmRepository
        name: arc
        namespace: arc-systems
  dependsOn:
    - name: arc
  values:
    githubConfigUrl: https://github.com/snyderjk
    githubConfigSecret: github-runner-secret
    runnerScaleSetName: homelab
